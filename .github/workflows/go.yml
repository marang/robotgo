name: Go
on:
  push:
  pull_request:

env:
  GOLANGCI_LINT_VERSION: v2.11.4

permissions:
  contents: read

# Avoid canceling in-progress jobs when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
      - name: Install Linux development dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libx11-dev libxtst-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            libgbm-dev libdrm-dev
      - name: Vet CGO build
        run: go vet ./...
      - name: Vet non-CGO build
        env:
          CGO_ENABLED: "0"
        run: go vet ./...
  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
      - name: Install Linux development dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libx11-dev libxtst-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            libgbm-dev libdrm-dev
      - name: Run race detector
        run: go test -race ./...
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
      - name: Install system dependencies for cgo typecheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libx11-dev libxtst-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            libgbm-dev libdrm-dev
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
      - name: Add golangci-lint to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
      - name: Run golangci-lint
        run: CGO_ENABLED=1 golangci-lint run --timeout=5m ./...
  test:
    # name: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
        id: go

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libx11-dev libxtst-dev \
            libwayland-dev libxkbcommon-dev wayland-protocols \
            libgbm-dev libdrm-dev

      - name: Get dependencies
        run: |
          go mod download

      - name: Build
        run: go build -v .
      - name: Test
        run: go test -v ./...
  nocgo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
      - name: Test explicit unsupported non-CGO build
        env:
          CGO_ENABLED: "0"
        run: |
          go test -v ./...
          go test -tags ocr ./...
  ocr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
      - name: Install OCR development dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libx11-dev libxtst-dev \
            libleptonica-dev libtesseract-dev
      - name: Test OCR build variant
        run: go test -tags ocr ./...
  wayland-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.x
      - name: Install Wayland test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config weston \
            libx11-dev libxtst-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols \
            libgbm-dev libdrm-dev libpipewire-0.3-dev
      - name: Run Wayland integration tests
        env:
          XDG_RUNTIME_DIR: /tmp
        run: |
          go test -tags "wayland" ./...
          go test -tags "portal" ./screen/portal -v
          go test -race -tags "pipewire" ./screen/portal -v
          # Compile the consent-driven ScreenCast/PipeWire harness; real runs
          # require a graphical desktop and ROBOTGO_SCREENCAST_E2E=1.
          go test -tags "pipewire integration" ./screen/portal -run '^$'
          # Compile the consent-driven harness; real runs use remote-desktop-e2e.yml.
          go test -tags "integration" ./input/portal -run '^$'
          go test -tags "wayland test" ./screen -run TestScreencopy -v
          go test -tags "wayland test" . -run TestDrmFindRenderNode -v
          go test -tags "wayland integration" . ./mouse ./window -v
