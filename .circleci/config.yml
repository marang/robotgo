version: 2.1
jobs:
  build:
    docker:
      - image: golang:1.23.0
    working_directory: /gopath/src/github.com/marang/robotgo
    steps:
      - checkout
      - run: apt update
      - run: |
          apt -y install gcc libc6-dev \
          libx11-dev xorg-dev libxtst-dev \
          xsel xclip
      - run: apt -y install xvfb
      - run:
          name: Set CGO_ENABLED
          command: |
            echo "export CGO_ENABLED=1" >> $BASH_ENV
            source $BASH_ENV
      - run: go get -v -t -d ./...
      - run: xvfb-run go test -v ./...
workflows:
  version: 2
  build:
    jobs:
      - build